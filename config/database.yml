# PostgreSQL (development/test: Docker の db を localhost:5432 で利用)
#   Gemfile: gem "pg"
#   起動: docker compose up -d
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: password
  host: localhost

development:
  <<: *default
  database: levely_development

# テスト DB は development とは別名にする（同時実行・データ混在を防ぐ）
test:
  <<: *default
  database: levely_test

# 本番（Render 等）は DATABASE_URL に接続情報が含まれる
production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
